name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: echo "REPO_LOWERCASE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ttser123/toey-sawatdee/toey-sawatdee:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
            NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
            NEXT_PUBLIC_ZOMBOID_API_URL=${{ secrets.NEXT_PUBLIC_ZOMBOID_API_URL }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via AWS Systems Manager (SSM)
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=toey-sawatdee-prod" \
            --parameters 'commands=[
              "TOKEN=\$(aws ssm get-parameter --name /toey-sawatdee/prod/ghcr-token --with-decryption --query Parameter.Value --output text --region ap-southeast-2)",
              "echo \$TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "docker pull ghcr.io/${{ github.repository }}/toey-sawatdee:latest",
              "docker stop toey-sawatdee || true",
              "docker rm toey-sawatdee || true",
              "docker run -d -p 80:3000 --name toey-sawatdee --restart unless-stopped ghcr.io/${{ github.repository }}/toey-sawatdee:latest"
            ]' \
            --comment "Secure Zero-SSH Deployment for toey-sawatdee" \
            --timeout-seconds 60 \
            --max-concurrency "50" \
            --max-errors "0"